name: Build APK

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone stable-diffusion.cpp with all submodules
        run: |
          git clone --recursive https://github.com/leejet/stable-diffusion.cpp.git app/src/main/cpp/stable-diffusion.cpp
          cd app/src/main/cpp/stable-diffusion.cpp
          git submodule update --init --recursive
          ls -la ggml/src/ggml-vulkan/
          test -f ggml/src/ggml-vulkan/CMakeLists.txt && echo "VULKAN CMAKE FOUND" || echo "VULKAN CMAKE MISSING"
          ls -la ggml/src/ggml-vulkan/SPIRV-Headers/ 2>/dev/null || echo "SPIRV-Headers NOT FOUND - checking alternate location"
          find . -name "SPIRV-Headers" -type d 2>/dev/null || true
          find . -name "spirv-headers" -type d 2>/dev/null || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK, CMake, Vulkan
        run: |
          sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev

      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar
          curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
